name: CI

on:
  push:
    branches: [ main, branch1 ]
  pull_request:
    branches: [ branch2 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Hello World
        run: |
          cmake .
          make
          ./HelloWorld